apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  labels:
    app: nginx
spec:
  revisionHistoryLimit: 1
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: nginx
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - image: ghcr.io/senk02/react-website:latest
        name: nginx
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: "1"
            memory: 64Mi
            ephemeral-storage: 64Mi
          requests:
            cpu: 10m
            memory: 16Mi
      - image: node:18-alpine
        name: metrics-proxy
        workingDir: /app
        command: ["/bin/sh", "-c"]
        args:
          - |
            cp -L /app-config/* /app/ && npm install && node server.js
        env:
        - name: PROMETHEUS_URL
          value: "http://prometheus.monitoring.svc.cluster.local:9090"
        - name: PEER_URL
          value: "http://makko.senk0.com"
        volumeMounts:
        - name: nodejs-app-config
          mountPath: /app-config
          readOnly: true
        - name: nodejs-app-workspace
          mountPath: /app
        ports:
        - containerPort: 3000
          name: metrics-proxy
        resources:
          limits:
            cpu: "500m"
            memory: 512Mi
            ephemeral-storage: 512Mi
          requests:
            cpu: 10m
            memory: 32Mi
      volumes:
      - name: nodejs-app-config
        configMap:
          name: metrics-proxy-app
      - name: nodejs-app-workspace
        emptyDir: {}
      - name: nginx-config
        configMap:
          name: nginx-metrics-config
