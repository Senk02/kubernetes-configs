apiVersion: v1
kind: Service
metadata:
  name: guest-bastion
  namespace: guest-bastion
  annotations:
    io.cilium/lb-ipam-ips: "10.1.1.150"   # free VIP in renkko's 10.1.1.100-240 pool
spec:
  type: LoadBalancer
  selector: { app: guest-bastion }
  ports:
    - { name: ssh, port: 22, targetPort: 2222, protocol: TCP }
