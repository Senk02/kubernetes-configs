# THE isolation control. Applied by Cilium at the pod veth (eBPF), before
# routing/masquerade, by pod identity (not UID) -> in-container root cannot bypass it.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: guest-bastion-isolation
  namespace: guest-bastion
spec:
  endpointSelector:
    matchLabels: { app: guest-bastion }
  ingress:
    # SSH in from the internet (arrives via MikroTik dst-nat). Pod port = 2222.
    - fromEntities: ["world"]
      toPorts:
        - ports: [{ port: "2222", protocol: TCP }]
    # allow kubelet health/probe traffic from the node
    - fromEntities: ["host", "health"]
  egress:
    # Allow ALL public internet, DENY every private / internal range.
    # This is what stops the friend reaching pods, services, nodes, LB VIPs and LAN.
    - toCIDRSet:
        - cidr: 0.0.0.0/0
          except:
            - 10.0.0.0/8        # renkko nodes/VIPs/pods/services + home LAN + makko
            - 172.16.0.0/12     # RFC1918
            - 192.168.0.0/16    # RFC1918
            - 100.64.0.0/10     # CGNAT
            - 169.254.0.0/16    # link-local / metadata
            - 127.0.0.0/8       # loopback
