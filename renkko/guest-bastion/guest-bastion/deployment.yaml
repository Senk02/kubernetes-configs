apiVersion: apps/v1
kind: Deployment
metadata:
  name: guest-bastion
  namespace: guest-bastion
  labels: { app: guest-bastion }
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: guest-bastion }
  template:
    metadata:
      labels: { app: guest-bastion }
    spec:
      dnsPolicy: None
      dnsConfig:
        nameservers: ["1.1.1.1", "1.0.0.1"]
      automountServiceAccountToken: false
      hostUsers: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sshd
          image: lscr.io/linuxserver/openssh-server:latest
          securityContext:
            allowPrivilegeEscalation: true
            capabilities:
              drop: ["NET_RAW"]
          env:
            - { name: PUID, value: "1000" }
            - { name: PGID, value: "1000" }
            - { name: TZ, value: "Etc/UTC" }
            - { name: USER_NAME, value: "friend" }
            - { name: PASSWORD_ACCESS, value: "false" }
            - { name: SUDO_ACCESS, value: "true" }
            - { name: PUBLIC_KEY_FILE, value: "/keys/authorized_keys" }
            - { name: LISTEN_PORT, value: "2222" }
          ports:
            - { name: ssh, containerPort: 2222 }
          volumeMounts:
            - { name: authkey, mountPath: /keys, readOnly: true }
            - { name: config, mountPath: /config }
            - { name: sshd-dropin, mountPath: /config/sshd/sshd_config.d, readOnly: true }
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
      volumes:
        - name: authkey
          configMap:
            name: guest-bastion-config
            items:
              - { key: authorized_keys, path: authorized_keys }
        - name: sshd-dropin
          configMap:
            name: guest-bastion-config
            items:
              - { key: forwarding.conf, path: forwarding.conf }
        - name: config
          persistentVolumeClaim:
            claimName: guest-bastion-config
