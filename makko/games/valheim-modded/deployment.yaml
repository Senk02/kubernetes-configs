apiVersion: apps/v1 
kind: Deployment
metadata:
  name: valheim-modded
  labels:
    app: valheim-modded
spec:
  revisionHistoryLimit: 1
  replicas: 0
  selector:
    matchLabels:
      app: valheim-modded
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: valheim-modded
    spec:
      containers:
      - image: lloesche/valheim-server
        name: valheim-modded
        volumeMounts:
        - name: config
          mountPath: /config
        - name: data
          mountPath: /opt/valheim
        ports:
        - containerPort: 2456
          protocol: UDP
        - containerPort: 2457
          protocol: UDP
        env: 
        - name: SERVER_NAME
          value: "Vivere"
        - name: WORLD_NAME
          value: "uwu"
        - name: BEPINEX
          value: "true"
        - name: SERVER_PUBLIC
          value: "true"
        - name: TZ
          value: "CST"
        resources:
          limits:
            cpu: 4
            memory: 4096Mi
            ephemeral-storage: 2Gi
          requests:
            cpu: 100m
            memory: 2048Mi
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: valheim-modded-assets
          readOnly: false
      - name: data
        persistentVolumeClaim:
          claimName: valheim-modded-data
          readOnly: false
---
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: valheim-modded-data
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 16Gi
  storageClassName: rook-cephfs
  volumeName: pvc-cba69c03-75a0-4266-99b3-2f0f24f892ae
  volumeMode: Filesystem
---
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: valheim-modded-assets
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 8Gi
  storageClassName: rook-cephfs
  volumeName: pvc-cd3acf21-faa7-492b-9069-2fc46a8f6d34
  volumeMode: Filesystem
