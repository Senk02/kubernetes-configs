# Pulls the aimRPG server secrets from Bitwarden (webhook ClusterSecretStore) into a single
# Secret `aimrpg-secrets` in the aimrpg namespace. Both postgres and the Go aimrpg-server
# consume it. Secret KEYS are named to match the container env exactly — the server pulls them
# with `envFrom: secretRef` and the config package reads AIMRPG_* / POSTGRES_* directly.
#
# Create these 5 Bitwarden login items and paste each item's UUID into the matching
# `remoteRef.key`. Each item packs two values into its username/password fields:
#
#   aimrpg-postgres           username=POSTGRES_USER            password=POSTGRES_PASSWORD
#   aimrpg-discord            username=DISCORD_CLIENT_ID        password=DISCORD_CLIENT_SECRET
#   aimrpg-login-hwid         username=LOGIN_SECRET (hex32)     password=HWID_SALT (hex32)
#   aimrpg-admin-bot          username=ADMIN_PASSWORD          password=DISCORD_BOT_TOKEN
#   aimrpg-channel-packkeys   username=CHANNEL_SEED             password=PACK_KEYS (JSON blob)
#
# Generate strong randoms with `openssl rand -hex 32`. CHANNEL_SEED is hashed to the 32-byte
# ed25519 seed by the server; PACK_KEYS is the full pack_keys.json contents.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: aimrpg-secrets
  labels:
    external-secrets.io/type: webhook
spec:
  refreshInterval: "5m"
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-login
  target:
    name: aimrpg-secrets
    creationPolicy: Owner
  data:
    # --- aimrpg-postgres ---
    - secretKey: POSTGRES_USER
      sourceRef: { storeRef: { name: bitwarden-login, kind: ClusterSecretStore } }
      remoteRef: { key: REPLACE-UUID-aimrpg-postgres, property: username }
    - secretKey: POSTGRES_PASSWORD
      sourceRef: { storeRef: { name: bitwarden-login, kind: ClusterSecretStore } }
      remoteRef: { key: REPLACE-UUID-aimrpg-postgres, property: password }
    # --- aimrpg-discord ---
    - secretKey: AIMRPG_DISCORD_CLIENT_ID
      sourceRef: { storeRef: { name: bitwarden-login, kind: ClusterSecretStore } }
      remoteRef: { key: REPLACE-UUID-aimrpg-discord, property: username }
    - secretKey: AIMRPG_DISCORD_CLIENT_SECRET
      sourceRef: { storeRef: { name: bitwarden-login, kind: ClusterSecretStore } }
      remoteRef: { key: REPLACE-UUID-aimrpg-discord, property: password }
    # --- aimrpg-login-hwid ---
    - secretKey: AIMRPG_LOGIN_SECRET
      sourceRef: { storeRef: { name: bitwarden-login, kind: ClusterSecretStore } }
      remoteRef: { key: REPLACE-UUID-aimrpg-login-hwid, property: username }
    - secretKey: AIMRPG_HWID_SALT
      sourceRef: { storeRef: { name: bitwarden-login, kind: ClusterSecretStore } }
      remoteRef: { key: REPLACE-UUID-aimrpg-login-hwid, property: password }
    # --- aimrpg-admin-bot ---
    - secretKey: AIMRPG_ADMIN_PASSWORD
      sourceRef: { storeRef: { name: bitwarden-login, kind: ClusterSecretStore } }
      remoteRef: { key: REPLACE-UUID-aimrpg-admin-bot, property: username }
    - secretKey: AIMRPG_DISCORD_BOT_TOKEN
      sourceRef: { storeRef: { name: bitwarden-login, kind: ClusterSecretStore } }
      remoteRef: { key: REPLACE-UUID-aimrpg-admin-bot, property: password }
    # --- aimrpg-channel-packkeys ---
    - secretKey: AIMRPG_CHANNEL_SEED
      sourceRef: { storeRef: { name: bitwarden-login, kind: ClusterSecretStore } }
      remoteRef: { key: REPLACE-UUID-aimrpg-channel-packkeys, property: username }
    - secretKey: AIMRPG_PACK_KEYS
      sourceRef: { storeRef: { name: bitwarden-login, kind: ClusterSecretStore } }
      remoteRef: { key: REPLACE-UUID-aimrpg-channel-packkeys, property: password }
