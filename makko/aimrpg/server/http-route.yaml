# Public entry point. TLS is terminated at the external gateway with the wildcard senk0 cert;
# HTTP->HTTPS redirect is handled globally by the gateway. The Go server handles Discord OAuth
# natively (GET /login, /login/callback), so it faces the gateway directly — no oauth-proxy.
#
# ⚠ The server's own auth (session tokens from the Discord login flow) is what protects the
# /aimrpg/* API on this public route. Keep the admin console (7351) off the internet.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: aimrpg-server
spec:
  parentRefs:
    - name: external
      namespace: gateway
      sectionName: https
  hostnames:
    - "aimrpg.senk0.com"
  rules:
    - backendRefs:
        - name: aimrpg-server
          port: 7350
