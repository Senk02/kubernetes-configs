# Encrypted content packs (module .bin blobs) served by aimrpg-server at /packs/.
# RWX so the blobs can be (re)populated by a short-lived helper pod while the server runs.
# Data is not in git — it is generated by `cmd/pack` and copied in out-of-band; the manifest
# (aimrpg-manifest ConfigMap) and keys (AIMRPG_PACK_KEYS secret) are the parts under GitOps.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aimrpg-packs
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
  storageClassName: rook-cephfs
  volumeMode: Filesystem
